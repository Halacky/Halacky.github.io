<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таймер</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent:#1f6feb; --bg:#f5f7fa; --ok:#2e9e5b; --muted:#c2c8d2; --warn:#e0a32e; --err:#c0392b; }
  html, body { height: 100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg);
         color:#2b3038; min-height:100vh; display:flex; flex-direction:column; align-items:center;
         padding:18px 14px 30px; gap:16px; position:relative; }
  .card { background:#fff; border-radius:16px; box-shadow:0 2px 16px rgba(0,0,0,.07); width:100%; max-width:900px; position:relative; }
  .timer { padding:24px 26px; text-align:center; }
  .modes { display:flex; gap:8px; justify-content:center; margin-bottom:16px; }
  .mode { border:1px solid #e1e5ec; background:#fff; color:#55606f; width:48px; padding:7px 0; border-radius:999px;
          font-size:.9rem; cursor:pointer; }
  .mode.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .display { font-variant-numeric:tabular-nums; font-weight:700; font-size:clamp(4rem,16vw,7rem); line-height:1;
             margin:4px 0 16px; color:#20262e; }
  .display.running { color:var(--accent); }
  .controls { display:flex; gap:12px; justify-content:center; }
  .ico { border:none; border-radius:50%; width:58px; height:58px; font-size:1.4rem; cursor:pointer; line-height:1;
         display:flex; align-items:center; justify-content:center; }
  .ico.primary { background:var(--accent); color:#fff; }
  .ico.ghost { background:#eef1f6; color:#55606f; }

  .note { padding:16px; flex:1; display:flex; min-height:300px; }
  textarea#note { flex:1; width:100%; resize:vertical; min-height:300px; border:1px solid #e1e5ec; border-radius:10px;
         padding:14px 16px; font-size:.95rem; line-height:1.5; outline:none; color:#2b3038; background:#fcfdff;
         font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; white-space:pre; overflow:auto; }
  textarea#note:focus { border-color:var(--accent); background:#fff; }
  textarea#note:disabled { background:#f1f3f6; }

  .dot { position:absolute; top:12px; right:14px; width:9px; height:9px; border-radius:50%; background:var(--muted); }
  .dot.ok{background:var(--ok)} .dot.saving{background:var(--warn)} .dot.err{background:var(--err)}

  .setup { padding:16px; display:flex; gap:10px; align-items:center; }
  .setup input { flex:1; padding:11px 13px; border:1px solid #d8dde6; border-radius:8px; font-size:.95rem;
         font-family:ui-monospace,Menlo,Consolas,monospace; outline:none; }
  .setup input:focus { border-color:var(--accent); }
  .setup .ico { width:44px; height:44px; font-size:1.1rem; }

  .gear { position:absolute; top:14px; right:16px; background:none; border:none; cursor:pointer; font-size:1rem;
          color:#cfd5de; line-height:1; }
  .gear:hover { color:#9aa3b0; }
  .hidden { display:none !important; }
</style>
</head>
<body>
  <button class="gear hidden" id="forgetBtn" aria-label="token">⚙</button>

  <div class="card timer">
    <div class="modes">
      <button class="mode active" data-min="25">25</button>
      <button class="mode" data-min="5">5</button>
      <button class="mode" data-min="15">15</button>
    </div>
    <div class="display" id="display">25:00</div>
    <div class="controls">
      <button class="ico primary" id="startBtn" aria-label="start">▶</button>
      <button class="ico ghost" id="resetBtn" aria-label="reset">↺</button>
    </div>
  </div>

  <div class="card setup" id="setup">
    <input id="patInput" type="password" placeholder="ghp_…" autocomplete="off" spellcheck="false">
    <button class="ico primary" id="saveTokenBtn" aria-label="ok">→</button>
    <span class="dot" id="setupDot"></span>
  </div>

  <div class="card note hidden" id="noteCard">
    <span class="dot" id="statusDot"></span>
    <textarea id="note" spellcheck="false" disabled></textarea>
  </div>

<script>
// ===================== Pomodoro timer =====================
const display=document.getElementById('display'), startBtn=document.getElementById('startBtn'),
      resetBtn=document.getElementById('resetBtn'), modes=document.querySelectorAll('.mode');
let total=25*60, remaining=total, ticking=null;
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
function render(){ display.textContent=fmt(remaining); document.title=(ticking?'▶ ':'')+fmt(remaining); }
function stop(){ clearInterval(ticking); ticking=null; startBtn.textContent='▶'; display.classList.remove('running'); render(); }
function start(){ if(ticking){stop();return;} startBtn.textContent='❚❚'; display.classList.add('running');
  const end=Date.now()+remaining*1000;
  ticking=setInterval(()=>{ remaining=Math.max(0,Math.round((end-Date.now())/1000)); render();
    if(remaining<=0){ stop(); beep();
      if(window.Notification && Notification.permission==='granted') new Notification('⏰'); } },250); }
function reset(){ stop(); remaining=total; render(); }
startBtn.onclick=()=>{ if(window.Notification && Notification.permission==='default') Notification.requestPermission(); start(); };
resetBtn.onclick=reset;
modes.forEach(b=>b.onclick=()=>{ modes.forEach(x=>x.classList.remove('active')); b.classList.add('active');
  total=+b.dataset.min*60; stop(); remaining=total; render(); });
function beep(){ try{ const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();
  o.connect(g); g.connect(c.destination); o.type='sine'; o.frequency.value=880;
  g.gain.setValueAtTime(.0001,c.currentTime); g.gain.exponentialRampToValueAtTime(.3,c.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.9); o.start(); o.stop(c.currentTime+.9);}catch(e){} }
render();

// ===================== Gist-backed note (gzip + локальный кэш) =====================
const API='https://api.github.com', FILE='pomodoro-note.md', DESC='pomodoro-timer-note (auto)';
const EMPTY='\u200b';                 // непустой плейсхолдер для пустой заметки (пробел GitHub отвергает как 422)
const CACHE='pomodoro_note_cache';    // локальная копия для мгновенной загрузки
const DEBOUNCE=5000, MIN_GAP=60000;   // лимит GitHub gist_update=100/час -> сохраняем не чаще раза в 60с (+ при уходе)
const CAN_GZIP=(typeof CompressionStream!=='undefined' && typeof DecompressionStream!=='undefined');
const setup=document.getElementById('setup'), noteCard=document.getElementById('noteCard'),
      note=document.getElementById('note'), statusDot=document.getElementById('statusDot'),
      setupDot=document.getElementById('setupDot'), patInput=document.getElementById('patInput'),
      saveTokenBtn=document.getElementById('saveTokenBtn'), forgetBtn=document.getElementById('forgetBtn');
let pat=localStorage.getItem('gh_pat')||'', gistId=localStorage.getItem('gist_id')||'';
let lastSaved='', saveTimer=null, inFlight=false, lastSaveAt=0;

function setDot(k){ statusDot.className='dot '+(k||''); }
function cacheGet(){ try{ return localStorage.getItem(CACHE)||''; }catch(e){ return ''; } }
function cacheSet(t){ try{ localStorage.setItem(CACHE,t); }catch(e){} }

// ---- gzip <-> base64 (без потерь; на выходе ровно исходный текст) ----
function bytesToB64(b){ let s='', C=0x8000; for(let i=0;i<b.length;i+=C) s+=String.fromCharCode.apply(null,b.subarray(i,i+C)); return btoa(s); }
function b64ToBytes(s){ const bin=atob(s), o=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) o[i]=bin.charCodeAt(i); return o; }
async function encode(text){
  if(!text) return EMPTY;
  if(!CAN_GZIP) return text;                                  // старый браузер -> плейнтекст
  const cs=new CompressionStream('gzip');
  const buf=await new Response(new Blob([new TextEncoder().encode(text)]).stream().pipeThrough(cs)).arrayBuffer();
  return 'GZIP:'+bytesToB64(new Uint8Array(buf));
}
async function decode(raw){
  if(!raw || raw===EMPTY || raw===' ') return '';
  if(typeof raw!=='string' || !raw.startsWith('GZIP:')) return raw;   // старый плейнтекст читается как есть
  const ds=new DecompressionStream('gzip');
  const buf=await new Response(new Blob([b64ToBytes(raw.slice(5))]).stream().pipeThrough(ds)).arrayBuffer();
  return new TextDecoder().decode(buf);
}

async function gh(path,opts={}){
  const res=await fetch(API+path,{...opts,headers:{
    'Authorization':'token '+pat,'Accept':'application/vnd.github+json','Content-Type':'application/json',...(opts.headers||{})}});
  if(res.status===401) throw new Error('401');
  if(!res.ok){ let m=''; try{ m=(await res.json()).message||''; }catch(e){} throw new Error('HTTP '+res.status+(m?' '+m:'')); }
  return res.status===204?null:res.json();
}

async function resolveGist(){
  if(gistId){ try{ const g=await gh('/gists/'+gistId); if(g&&g.files&&g.files[FILE]) return; }catch(e){ if(e.message==='401') throw e; } }
  const list=await gh('/gists?per_page=100');
  const found=list.find(g=>g.files&&g.files[FILE]);
  if(found){ gistId=found.id; }
  else { const c=await gh('/gists',{method:'POST',body:JSON.stringify({description:DESC,public:false,files:{[FILE]:{content:EMPTY}}})}); gistId=c.id; }
  localStorage.setItem('gist_id',gistId);
}

async function loadNote(){
  const g=await gh('/gists/'+gistId); const f=g.files[FILE]; let raw='';
  // если файл всё же >1МБ (сжатого) — приходит truncated, тянем raw_url БЕЗ заголовков (CORS-*, токен не нужен)
  if(f){ raw=(f.truncated && f.raw_url) ? await (await fetch(f.raw_url)).text() : (f.content||''); }
  const c=await decode(raw);
  note.value=c; lastSaved=c; cacheSet(c);
}

async function patch(text){
  const payload=await encode(text);
  await gh('/gists/'+gistId,{method:'PATCH',body:JSON.stringify({files:{[FILE]:{content:payload}}})});
}

async function save(){
  if(inFlight) return;
  if(note.value===lastSaved){ setDot('ok'); return; }
  const wait=MIN_GAP-(Date.now()-lastSaveAt);
  if(wait>0){ schedule(wait); return; }            // слишком часто -> отложить (защита от лимита gist_update)
  inFlight=true; setDot('saving'); const text=note.value;
  try{
    await patch(text); lastSaved=text; lastSaveAt=Date.now(); cacheSet(text); setDot('ok');
    if(note.value!==lastSaved) schedule(DEBOUNCE);  // правки во время сохранения (ТОЛЬКО при успехе)
  }
  catch(e){ setDot('err'); if(e.message==='401') showSetup(); }  // ошибка/403: не зацикливаемся
  finally{ inFlight=false; }
}
async function forceSave(){   // при уходе со страницы/переключении вкладки — без троттла (события редкие)
  if(inFlight || !gistId || note.value===lastSaved) return;
  inFlight=true; const text=note.value;
  try{ await patch(text); lastSaved=text; lastSaveAt=Date.now(); cacheSet(text); setDot('ok'); }
  catch(e){ setDot('err'); }
  finally{ inFlight=false; }
}
function schedule(d){ setDot('saving'); clearTimeout(saveTimer); saveTimer=setTimeout(save,d); }

note.addEventListener('input',()=>schedule(DEBOUNCE));
note.addEventListener('blur',()=>{ clearTimeout(saveTimer); save(); });
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ forceSave(); return; }                 // ушёл со страницы -> сохранить сразу
  if(gistId && note.value===lastSaved && document.activeElement!==note) loadNote().catch(()=>{}); // вернулся -> подтянуть свежее
});

function showSetup(){ setup.classList.remove('hidden'); noteCard.classList.add('hidden'); forgetBtn.classList.add('hidden'); note.disabled=true; }
async function connect(){
  noteCard.classList.remove('hidden'); forgetBtn.classList.remove('hidden'); note.disabled=true; setDot('saving');
  const cached=cacheGet(); if(cached){ note.value=cached; lastSaved=cached; }   // мгновенный предпросмотр из кэша
  try{ await resolveGist(); await loadNote(); note.disabled=false; setDot('ok'); setup.classList.add('hidden'); }
  catch(e){ if(e.message==='401'){ setupDot.className='dot err'; showSetup(); }
            else { setDot('err'); if(cached) note.disabled=false; } }   // нет сети, но кэш есть -> дай работать
}
saveTokenBtn.onclick=()=>{ const v=patInput.value.trim(); if(!v) return;
  pat=v; localStorage.setItem('gh_pat',pat); patInput.value=''; setupDot.className='dot';
  gistId=localStorage.getItem('gist_id')||''; connect(); };
patInput.addEventListener('keydown',e=>{ if(e.key==='Enter') saveTokenBtn.onclick(); });
forgetBtn.onclick=()=>{ localStorage.removeItem('gh_pat'); localStorage.removeItem('gist_id'); localStorage.removeItem(CACHE);
  pat=''; gistId=''; note.value=''; lastSaved=''; showSetup(); };

if(pat) connect(); else showSetup();
</script>
</body>
</html>
